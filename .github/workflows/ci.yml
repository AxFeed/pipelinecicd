name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write  # requis pour mkdocs gh-deploy

env:
  PYTHON_VERSION: "3.11"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 3. Cache pip
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Dépendances backend
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      # 5. Lint avec ruff
      - name: Lint and format check with ruff
        run: |
          pip install ruff
          ruff check backend/
          ruff format --check backend/

      # 6. Entraîner le modèle (nécessaire pour les tests)
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ./mlruns
        run: python backend/ml/train.py

      # 7. Tests
      - name: Run tests
        run: pytest backend/tests/ -v

      # 8. Déploiement documentation
      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Configure Git for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy documentation
        run: mkdocs gh-deploy --force --config-file docs/mkdocs.yml

      # 9. Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 10. Login DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 11. Build & Push backend
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iris-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 12. Build & Push frontend
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iris-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 13. Déploiement Azure backend
      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: <NOM_APP_BACKEND>
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/iris-backend:latest

      # 14. Déploiement Azure frontend
      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: <NOM_APP_FRONTEND>
          publish-profile: ${{ secrets.DOCKERHUB_USERNAME }}/iris-frontend:latest
          images: ${{ secrets.DOCKERHUB_USERNAME }}/iris-frontend:latest